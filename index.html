<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fasyal Egzersiz</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        #container { position: relative; width: 360px; height: 480px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; }
        #webcam { width: 360px; height: 480px; display: block; transform: scaleX(-1); object-fit: cover; }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 360px; height: 480px; z-index: 10; pointer-events: none; }
        #gaugeContainer { width: 300px; height: 30px; background: #ddd; margin: 20px auto; border-radius: 15px; overflow: hidden; border: 2px solid #555; }
        #gaugeFill { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.1s ease; }
        #startButton { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Kaş Kaldırma</h1>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>
    
    <div id="gaugeContainer">
        <div id="gaugeFill"></div>
    </div>
    <div id="scoreText">Puan: 0</div>
    <button id="startButton">Egzersizi Başlat</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const gaugeFill = document.getElementById('gaugeFill');
        const scoreText = document.getElementById('scoreText');
        
        let faceLandmarker;

        // Ovali çiz
        function drawOval() {
            ctx.clearRect(0, 0, 360, 480);
            ctx.beginPath();
            ctx.setLineDash([10, 10]);
            ctx.ellipse(180, 240, 90, 140, 0, 0, 2 * Math.PI);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        async function initApp() {
            // Kütüphanenin yüklenmesini bekle (Global 'vision' objesini kontrol et)
            if (typeof vision === 'undefined') {
                setTimeout(initApp, 500); // 500ms bekle ve tekrar dene
                return;
            }
            
            const { FaceLandmarker, FilesetResolver } = vision;
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });
            
            predictLoop();
        }

        function predictLoop() {
            drawOval();
            if (faceLandmarker && video.readyState === 4) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const l = results.faceLandmarks[0];
                    const diff = Math.abs(l[70].y - l[300].y);
                    const score = Math.max(0, 100 - (diff * 1500));
                    gaugeFill.style.width = score + "%";
                    scoreText.innerText = "Puan: " + Math.round(score);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        document.getElementById('startButton').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('startButton').style.display = 'none';
                initApp();
            } catch (err) {
                alert("Kamera izni gerekli!");
            }
        });
    </script>
</body>
</html>
