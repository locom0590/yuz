<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fasiyal Paralizi - Takip</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100dvh; }
        .container { position: relative; width: 100vw; height: 100dvh; }
        #webcam, #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top: 0; left: 0; z-index: 1; }
        #output_canvas { z-index: 2; } 
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <button id="startBtn">Başla</button>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        let faceLandmarker;
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const startBtn = document.getElementById("startBtn");

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
        }
        init();

        startBtn.addEventListener("click", async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.style.display = 'none';
            } catch (e) { alert("Kamera hatası!"); }
        });

        function renderLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                predict();
            }
            window.requestAnimationFrame(renderLoop);
        }
        
       async function predict() {
            if (!faceLandmarker) return;
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Hedefler (Ekranın sabit bir noktasında dudakların olması gereken yer)
            const targetX = canvas.width * 0.5;
            const targetY = canvas.height * 0.6;
            
            // 1. Hedef Çizimi (Ghost Markers)
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.beginPath();
            ctx.arc(targetX - 50, targetY, 10, 0, 2 * Math.PI); // Sol hedef
            ctx.arc(targetX + 50, targetY, 10, 0, 2 * Math.PI); // Sağ hedef
            ctx.fill();

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    const solAgiz = landmarks[61];
                    const sagAgiz = landmarks[291];
                    
                    const simetriFarki = Math.abs(solAgiz.y - sagAgiz.y);
                    const isSimetric = simetriFarki < 0.003; 
                    
                    // Dudak Noktalarını Çiz
                    ctx.fillStyle = isSimetric ? "#00FF00" : "#FF0000";
                    [solAgiz, sagAgiz].forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x * canvas.width, p.y * canvas.height, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
            window.requestAnimationFrame(predict);
        }
            window.requestAnimationFrame(predict);
        }
        
        video.addEventListener("loadedmetadata", () => {
            renderLoop();
        });
    </script>
</body>
</html>
