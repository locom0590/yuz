<!DOCTYPE html>
<html lang="tr">
<head>
   <script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    let faceLandmarker;
    let video = document.getElementById("webcam");
    let canvas = document.getElementById("output_canvas");
    let ctx = canvas.getContext("2d");

    // 1. MediaPipe'i Başlat
    async function setupFaceLandmarker() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
            outputFaceBlendshapes: true,
            runningMode: "VIDEO",
            numFaces: 1
        });
    }
    setupFaceLandmarker();

    // 2. Kamera Başlatma ve Döngü
    document.getElementById("startBtn").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        video.addEventListener("loadeddata", predictWebcam);
        document.getElementById("startBtn").style.display = 'none';
    });

    // 3. Yüzü Anlık Takip Et ve Verileri Al
    async function predictWebcam() {
    console.log("Tahmin döngüsü çalışıyor..."); // Fonksiyon giriyor mu?
    
    if (!faceLandmarker) {
        console.warn("FaceLandmarker henüz hazır değil.");
        window.requestAnimationFrame(predictWebcam);
        return;
    }

    let startTimeMs = performance.now();
    const results = faceLandmarker.detectForVideo(video, startTimeMs);

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        console.log("Yüz tespit edildi:", results.faceLandmarks[0][0]);
    } else {
        console.log("Yüz algılanamadı, kamera açısı veya ışık?");
    }
    window.requestAnimationFrame(predictWebcam);
}
    }
</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fasiyal Paralizi - Başlangıç</title>
    <style>
        /* Sayfanın kaymasını ve boşluk oluşmasını engelleyen en kesin CSS */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw;
            height: 100dvh;
            background-color: #000;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed; /* iPhone'da kaymayı durdurur */
        }
        .container { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100dvh;
            overflow: hidden;
        }
        #webcam, #output_canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Görüntüyü ekranı tamamen dolduracak şekilde kırpar */
            transform: scaleX(-1); /* Ayna efekti */
            display: block;
        }
        #output_canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <button id="startBtn">Başla</button>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; 
            } catch (err) {
                console.error("Kamera hatası: ", err);
                alert("Kameraya erişilemedi. Lütfen izin verin.");
            }
        });
    </script>
</body>
</html>
