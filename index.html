<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Fasiyal Takip</title>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #webcam, #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 15px; z-index: 10; }
    </style>
</head>
<body>
    <button id="startBtn">Yüz Takibini Başlat</button>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        // Tüm önemli yüz hatları (468 noktanın kritik bölgeleri)
        const CRITICAL_INDICES = [
            10, 151, 9, 8, 168, // Alın
            70, 63, 105, 66, 107, 300, 293, 334, 296, 336, // Kaşlar
            159, 145, 386, 374, // Göz kapakları
            116, 346, 207, 427, // Elmacık kemikleri
            61, 291, 0, 13, 14 // Dudak ve ağız
        ];

        let faceLandmarker;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.style.display = "none";
                
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO"
                });
                
                renderLoop();
            } catch (err) { alert("Hata: " + err.message); }
        }

        function renderLoop() {
            if (video.readyState >= 2) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                const results = faceLandmarker.detectForVideo(video, performance.now());
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.faceLandmarks) {
                    results.faceLandmarks.forEach(landmarks => {
                        ctx.fillStyle = "#2ecc71";
                        CRITICAL_INDICES.forEach(index => {
                            const point = landmarks[index];
                            ctx.beginPath();
                            // Nokta boyutu küçültüldü (2px)
                            ctx.arc(point.x * canvas.width, point.y * canvas.height, 2, 0, 2 * Math.PI);
                            ctx.fill();
                        });
                    });
                }
            }
            requestAnimationFrame(renderLoop);
        }

        startBtn.addEventListener("click", startApp);
    </script>
</body>
</html>
