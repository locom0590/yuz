<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasiyal Rehabilitasyon Başlat</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        #webcam { display: none; width: 640px; height: 480px; transform: scaleX(-1); } /* Ayna etkisi */
        #output { position: absolute; width: 640px; height: 480px; }
        #startBtn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <button id="startBtn">Egzersizi Başlat</button>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        const EYEBROW_INDICES = [70, 63, 105, 66, 107, 55, 65, 52, 53, 46, 300, 293, 334, 296, 336, 285, 295, 282, 283, 276];

        async function startApp() {
            startBtn.style.display = "none";
            video.style.display = "block";

            // Kamera Erişimi
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera izni alınamadı: " + err.message);
                return;
            }

            // MediaPipe Kurulumu
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                renderLoop(faceLandmarker);
            };
        }

        function renderLoop(landmarker) {
            const results = landmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    ctx.fillStyle = "#00FF00";
                    EYEBROW_INDICES.forEach(index => {
                        const point = landmarks[index];
                        // X koordinatını ters çeviriyoruz (Ayna görüntüsü)
                        ctx.beginPath();
                        ctx.arc((1 - point.x) * canvas.width, point.y * canvas.height, 3, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
            requestAnimationFrame(() => renderLoop(landmarker));
        }

        startBtn.addEventListener("click", startApp);
    </script>
</body>
</html>
