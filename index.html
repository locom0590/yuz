<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fasyal Egzersiz</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        #container { position: relative; width: 100%; max-width: 360px; margin: 0 auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: #000; min-height: 480px; }
        #webcam { width: 100%; transform: scaleX(-1); display: block; }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #gaugeContainer { width: 80%; max-width: 300px; height: 30px; background: #ddd; margin: 20px auto; border-radius: 15px; overflow: hidden; border: 2px solid #555; }
        #gaugeFill { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.1s ease; }
        #instructionArea { font-size: 14px; margin-bottom: 10px; background: #fff; padding: 10px; border-radius: 10px; }
        #startButton { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Kaş Kaldırma</h1>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>
    
    <div id="gaugeContainer">
        <div id="gaugeFill"></div>
    </div>
    <div id="scoreText">Puan: 0</div>

    <div id="instructionArea">
        <b>Kalibrasyon:</b> Yüzünü ovalin içine hizala.
    </div>
    <button id="startButton">Egzersizi Başlat</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const instructionArea = document.getElementById('instructionArea');
        const gaugeFill = document.getElementById('gaugeFill');
        const scoreText = document.getElementById('scoreText');
        
        let faceLandmarker;

        // Oval çizim fonksiyonu
        function drawOval() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.setLineDash([10, 10]);
            ctx.ellipse(canvas.width/2, canvas.height/2, canvas.width*0.25, canvas.height*0.35, 0, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        async function initMediaPipe() {
            const { FaceLandmarker, FilesetResolver } = vision;
            const visionResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(visionResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });
            // Model hazır olduğunda döngüyü başlat
            requestAnimationFrame(predictWebcam);
        }

        function predictWebcam() {
            drawOval(); // Ovali her frame'de çiz
            if (faceLandmarker && video.readyState === 4) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const leftY = landmarks[70].y;
                    const rightY = landmarks[300].y;
                    const diff = Math.abs(leftY - rightY);
                    const score = Math.max(0, 100 - (diff * 1500)); 
                    gaugeFill.style.width = score + "%";
                    scoreText.innerText = "Puan: " + Math.round(score);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        startButton.addEventListener('click', async () => {
            try {
                // Kamera akışını başlat
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // Video boyutlarının yüklenmesini bekle
                video.onloadedmetadata = () => {
                    video.play();
                    startButton.style.display = 'none';
                    instructionArea.style.display = 'none';
                    initMediaPipe();
                };
            } catch (err) {
                alert("Kamera izni alınamadı. Lütfen tarayıcı izinlerini kontrol edin.");
            }
        });
    </script>
</body>
</html>
