<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fasyal Egzersiz</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        #container { position: relative; width: 100%; max-width: 360px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; }
        #webcam { width: 100%; display: block; transform: scaleX(-1); }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #gaugeContainer { width: 80%; max-width: 300px; height: 30px; background: #ddd; margin: 20px auto; border-radius: 15px; overflow: hidden; border: 2px solid #555; }
        #gaugeFill { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.1s ease; }
        #startButton { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Kaş Kaldırma</h1>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>
    
    <div id="gaugeContainer">
        <div id="gaugeFill"></div>
    </div>
    <div id="scoreText">Puan: 0</div>
    <button id="startButton">Egzersizi Başlat</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const gaugeFill = document.getElementById('gaugeFill');
        const scoreText = document.getElementById('scoreText');
        
        let faceLandmarker;

        async function initApp() {
            const { FaceLandmarker, FilesetResolver } = vision;
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });
            
            // Kamera başladığında boyutu ayarla
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            predictLoop();
        }

        function drawOval() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.setLineDash([10, 10]);
            ctx.ellipse(canvas.width/2, canvas.height/2, canvas.width*0.25, canvas.height*0.35, 0, 0, 2 * Math.PI);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        function predictLoop() {
            drawOval();
            if (faceLandmarker && video.readyState === 4) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    // MediaPipe 70: sol kaş, 300: sağ kaş
                    const diff = Math.abs(landmarks[70].y - landmarks[300].y);
                    const score = Math.max(0, 100 - (diff * 1500));
                    gaugeFill.style.width = score + "%";
                    scoreText.innerText = "Puan: " + Math.round(score);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        startButton.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                video.play();
                startButton.style.display = 'none';
                await initApp();
            } catch (err) {
                alert("Kamera izni gerekli: " + err.message);
            }
        });
    </script>
</body>
</html>
