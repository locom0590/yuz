<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Egzersiz</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #222; text-align: center; color: white; font-family: sans-serif; }
        #app { position: relative; width: 360px; height: 480px; margin: 20px auto; overflow: hidden; border: 2px solid white; }
        #webcam { width: 360px; height: 480px; transform: scaleX(-1); object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 360px; height: 480px; z-index: 5; }
        #ui { position: absolute; bottom: 20px; width: 100%; z-index: 10; }
        #gauge { width: 200px; height: 20px; background: #555; margin: 0 auto 10px; border-radius: 10px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: lime; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="app">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" width="360" height="480"></canvas>
        <div id="ui">
            <div id="gauge"><div id="fill"></div></div>
            <div id="score">Puan: 0</div>
            <button id="btn" style="padding: 10px 20px;">Başlat</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fill = document.getElementById('fill');
        const score = document.getElementById('score');

        // Ovali çiz
        function drawOval() {
            ctx.clearRect(0, 0, 360, 480);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 5;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.ellipse(180, 240, 90, 130, 0, 0, 2 * Math.PI);
            ctx.stroke();
        }

        async function startApp() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            
            // Safari için: video oynamaya başladığında boyutları kesinleşir
            await new Promise(r => video.onplaying = r); 
            
            const { FaceLandmarker, FilesetResolver } = vision;
            const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            const landmarker = await FaceLandmarker.createFromOptions(resolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });
            
            // 4. Döngü
            function loop() {
                drawOval();
                const res = landmarker.detectForVideo(video, performance.now());
                if(res.faceLandmarks.length > 0) {
                    const l = res.faceLandmarks[0];
                    const d = Math.abs(l[70].y - l[300].y);
                    const s = Math.max(0, 100 - (d * 1500));
                    fill.style.width = s + "%";
                    score.innerText = "Puan: " + Math.round(s);
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        document.getElementById('btn').onclick = () => {
            document.getElementById('btn').style.display = 'none';
            startApp();
        };
    </script>
</body>
</html>
