<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fasiyal Paralizi - Başlangıç</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100dvh; /* Burası değişti */
            width: 100vw;
            background-color: #000;
            font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; /* Burası değişti */
        }
        #webcam, #output_canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Görüntünün alanı tam doldurmasını sağlar */
            transform: scaleX(-1); /* Ayna efekti */
            display: block;
        }
        #output_canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <button id="startBtn">Başla</button>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            try {
                // Ön kamerayı zorunlu kılmak için facingMode: 'user'
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; // Başla butonunu gizle
            } catch (err) {
                console.error("Kamera hatası: ", err);
                alert("Kameraya erişilemedi. Lütfen izin verin.");
            }
        });
    </script>
</body>
</html>
