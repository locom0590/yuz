<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaş Takip - Mobil Uyumlu</title>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        /* Mobil cihazlarda görüntünün düzgün ölçeklenmesi için object-fit: cover ve transform */
        #webcam, #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 15px; z-index: 10; }
    </style>
</head>
<body>
    <button id="startBtn">Başlat</button>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");
        const EYEBROW_INDICES = [70, 63, 105, 66, 107, 55, 65, 52, 53, 46, 300, 293, 334, 296, 336, 285, 295, 282, 283, 276];

        let faceLandmarker;

        async function startApp() {
            try {
                // iPhone/Android için daha spesifik kamera ayarları
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                startBtn.style.display = "none";
                
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO"
                });
                
                // Mobil cihazlarda video metadatası bazen geç yüklenir, döngüyü hemen başlatıyoruz
                renderLoop();
            } catch (err) { alert("Kamera hatası: " + err.message); }
        }

        function renderLoop() {
            // video.readyState 2 veya 3 (HAVE_CURRENT_DATA veya HAVE_FUTURE_DATA) mobil cihazlarda daha stabil
            if (video.readyState >= 2) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                const results = faceLandmarker.detectForVideo(video, performance.now());
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.faceLandmarks) {
                    results.faceLandmarks.forEach(landmarks => {
                        ctx.fillStyle = "#2ecc71";
                        EYEBROW_INDICES.forEach(index => {
                            const point = landmarks[index];
                            ctx.beginPath();
                            ctx.arc(point.x * canvas.width, point.y * canvas.height, 6, 0, 2 * Math.PI); // Mobil için noktaları büyüttük
                            ctx.fill();
                        });
                    });
                }
            }
            requestAnimationFrame(renderLoop);
        }

        startBtn.addEventListener("click", startApp);
    </script>
</body>
</html>
