<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasiyal Takip Prototipi</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; }
        video, canvas { position: absolute; width: 640px; height: 480px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");

        // Kaşlar için landmark indisleri (MediaPipe FaceMesh indexleri)
        const EYEBROW_INDICES = [
            70, 63, 105, 66, 107, 55, 65, 52, 53, 46, // Sol kaş
            300, 293, 334, 296, 336, 285, 295, 282, 283, 276 // Sağ kaş
        ];

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                renderLoop(faceLandmarker);
            };
        }

        function renderLoop(landmarker) {
            const results = landmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    ctx.fillStyle = "#00FF00";
                    EYEBROW_INDICES.forEach(index => {
                        const point = landmarks[index];
                        ctx.beginPath();
                        ctx.arc(point.x * canvas.width, point.y * canvas.height, 3, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
            requestAnimationFrame(() => renderLoop(landmarker));
        }

        init();
    </script>
</body>
</html>
