<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Kaş Takip</title>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");

        async function init() {
            // 1. Kamera İzni
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            // 2. Modeli Yükle
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            const landmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            // 3. Döngü
            function update() {
                if (video.readyState >= 2) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const results = landmarker.detectForVideo(video, performance.now());
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (results.faceLandmarks) {
                        results.faceLandmarks.forEach(landmarks => {
                            ctx.fillStyle = "red"; // Daha belirgin olsun
                            [70, 63, 105, 66, 107, 55, 65, 52, 53, 46, 300, 293, 334, 296, 336, 285, 295, 282, 283, 276].forEach(i => {
                                ctx.beginPath();
                                ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 5, 0, 2 * Math.PI);
                                ctx.fill();
                            });
                        });
                    }
                }
                requestAnimationFrame(update);
            }
            update();
        }

        // Otomatik başlatma (Dokunma ile)
        window.addEventListener("touchstart", init, { once: true });
        window.addEventListener("click", init, { once: true });
    </script>
</body>
</html>
