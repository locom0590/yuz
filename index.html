<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fasiyal Paralizi - Takip</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100dvh; }
        .container { position: relative; width: 100vw; height: 100dvh; }
        #webcam, #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top: 0; left: 0; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <button id="startBtn">Başla</button>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        let faceLandmarker;
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
            console.log("MediaPipe Hazır!");
        }
        init();

        startBtn.addEventListener("click", async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            startBtn.style.display = 'none';
            video.onloadedmetadata = () => {
                // iPhone için canvas'ın fiziksel boyutunu ekranla eşitle
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                // Görünürlüğü garanti altına almak için canvas stilini de zorla
                canvas.style.width = "100%";
                canvas.style.height = "100%";
                predict();
            };
        });

        async function predict() {
            if (!faceLandmarker) return;
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    const regions = {
                        "Sol Göz": { indices: [33, 160, 158, 133, 153, 144], color: "#FF0000" },
                        "Sağ Göz": { indices: [263, 387, 385, 362, 380, 373], color: "#0000FF" },
                        "Dudaklar": { indices: [61, 291, 0, 17, 37, 267], color: "#FFFF00" },
                        "Sol Kaş": { indices: [70, 63, 105, 66, 107], color: "#00FF00" },
                        "Sağ Kaş": { indices: [300, 293, 334, 296, 336], color: "#00FF00" }
                    };

                    for (const [regionName, data] of Object.entries(regions)) {
                        ctx.fillStyle = data.color;
                        for (const index of data.indices) {
                            const point = landmarks[index];
                            // Mobil ekran çözünürlüğü için değerleri normalize ediyoruz
                            const x = point.x * canvas.width;
                            const y = point.y * canvas.height;
                            ctx.beginPath();
                            ctx.arc(x, y, 1, 0, 2 * Math.PI); // Boyut 4'ten 1'e düşürüldü (x0.25)
                            ctx.fill();
                        }
                    }
                }
            }
            window.requestAnimationFrame(predict);
        }
    </script>
</body>
</html>
