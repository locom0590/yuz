<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fasiyal Paralizi - Rehabilitasyon</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100dvh; }
        .container { position: relative; width: 100vw; height: 100dvh; }
        #webcam, #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top: 0; left: 0; z-index: 1; }
        #output_canvas { z-index: 2; } 
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; color: white; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="menu">
            <button id="startBtn">Başla</button>
            <div id="sideSelection" style="display:none;">
                <p>Etkilenen tarafı seçin:</p>
                <button onclick="setSide('left')">Sol Taraf</button>
                <button onclick="setSide('right')">Sağ Taraf</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        let faceLandmarker, affectedSide = null;
        let basariSayaci = 0;
        const hedefSure = 60;
        
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const startBtn = document.getElementById("startBtn");
        const sideSelection = document.getElementById("sideSelection");

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
        }
        init();

        startBtn.addEventListener("click", async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                sideSelection.style.display = 'block';
            } catch (e) { alert("Kamera hatası!"); }
        });

        window.setSide = (side) => {
            affectedSide = side;
            sideSelection.style.display = 'none';
            renderLoop();
        };

        function renderLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                predict();
            }
            window.requestAnimationFrame(renderLoop);
        }
        
        async function predict() {
            if (!faceLandmarker) return;
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    const burunUcu = landmarks[1];
                    const hedefMesafesi = 0.05; 
                    const solHedefX = (burunUcu.x - hedefMesafesi) * canvas.width;
                    const sagHedefX = (burunUcu.x + hedefMesafesi) * canvas.width;
                    const hedefY = (burunUcu.y + 0.05) * canvas.height;

                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.beginPath();
                    ctx.arc(solHedefX, hedefY, 15, 0, 2 * Math.PI);
                    ctx.arc(sagHedefX, hedefY, 15, 0, 2 * Math.PI);
                    ctx.fill();

                    const solAgiz = landmarks[61];
                    const sagAgiz = landmarks[291];
                    const simetriFarki = Math.abs(solAgiz.y - sagAgiz.y);
                    const isSimetric = simetriFarki < 0.003; 
                    
                    if (isSimetric) basariSayaci++; else basariSayaci = 0;

                    if (basariSayaci > 0) {
                        ctx.fillStyle = "white";
                        ctx.font = "24px Arial";
                        ctx.textAlign = "left";
                        ctx.fillText("Odaklan: " + (basariSayaci / 30).toFixed(1) + " sn", 50, 50);
                    }

                    if (basariSayaci >= hedefSure) {
                        const emoji = ["🎉", "🎊", "✨"][Math.floor(Math.random() * 3)];
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        ctx.font = "60px Arial";
                        ctx.textAlign = "center";
                        ctx.fillText(emoji, x, y);
                        
                        ctx.fillStyle = "white";
                        ctx.font = "bold 40px Arial";
                        ctx.fillText("MÜKEMMEL!", canvas.width / 2, canvas.height / 2);
                    }
                    
                    ctx.fillStyle = isSimetric ? "#00FF00" : "#FF0000";
                    [solAgiz, sagAgiz].forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x * canvas.width, p.y * canvas.height, 8, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
        }
    </script>
</body>
</html>
