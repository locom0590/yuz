<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasiyal Paralizi - Başlangıç</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        #webcam { width: 100%; max-width: 500px; transform: scaleX(-1); } /* Ayna yansıması için */
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; max-width: 500px; transform: scaleX(-1); }
        .container { position: relative; margin: 0 auto; max-width: 500px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Rehabilitasyon Başlatıcı</h1>
    
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <button id="startBtn">Başla</button>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            try {
                // Ön kamerayı zorunlu kılmak için facingMode: 'user'
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; // Başla butonunu gizle
            } catch (err) {
                console.error("Kamera hatası: ", err);
                alert("Kameraya erişilemedi. Lütfen izin verin.");
            }
        });
    </script>
</body>
</html>
