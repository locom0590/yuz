<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Fasiyal Analiz</title>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #webcam, #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 15px; z-index: 10; }
    </style>
</head>
<body>
    <button id="startBtn">Yüz Analizini Başlat</button>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        // Yüzün detaylı haritası (İstenilen tüm bölgeler dahil)
        const FULL_FACE_INDICES = [
            // Burun (Ucu ve orta hat)
            1, 2, 98, 327, 440, 4,
            // Alın (3 yatay sıra)
            10, 338, 297, 332, 284, 251, 389, 356, 454, 323, // Sağ
            151, 108, 69, 103, 54, 21, 162, 127, 234, 93,     // Sol
            // Elmacık Kemikleri (Sağ ve Sol)
            116, 117, 118, 345, 346, 347,
            // Mandibula (Çene hattı)
            152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234,
            378, 379, 365, 397, 288, 361, 323, 454
        ];

        let faceLandmarker;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.style.display = "none";
                
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                renderLoop();
            } catch (err) { alert("Kamera hatası: " + err.message); }
        }

        function renderLoop() {
            if (video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.faceLandmarks) {
                    for (const landmarks of results.faceLandmarks) {
                        ctx.fillStyle = "#2ecc71";
                        for (const index of FULL_FACE_INDICES) {
                            const point = landmarks[index];
                            ctx.beginPath();
                            ctx.arc(point.x * canvas.width, point.y * canvas.height, 2, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }

        startBtn.addEventListener("click", startApp);
    </script>
</body>
</html>
