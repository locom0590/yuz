<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasiyal Rehabilitasyon Prototip</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        #container { position: relative; width: 640px; height: 480px; }
        #webcam, #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #startBtn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 15px; z-index: 10; }
    </style>
</head>
<body>

    <button id="startBtn">Egzersizi Başlat</button>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        // Fasiyal paralizi takibi için kritik bölgeler (MediaPipe FaceMesh indeksleri)
        const CRITICAL_INDICES = {
            alın: [10, 107, 336], // Alın merkezi ve yanlar
            goz: [159, 145, 386, 374], // Üst ve alt göz kapakları
            yanak: [116, 346, 207, 427], // Elmacık kemikleri
            agiz: [0, 61, 291, 13, 14] // Dudak hatları
        };

        let faceLandmarker;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startBtn.style.display = "none";
                
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO"
                });

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    renderLoop();
                };
            } catch (err) {
                alert("Kamera hatası: " + err.message);
            }
        }

        function renderLoop() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    ctx.fillStyle = "#2ecc71";
                    // Tüm kritik noktaları çiz
                    Object.values(CRITICAL_INDICES).flat().forEach(index => {
                        const point = landmarks[index];
                        ctx.beginPath();
                        ctx.arc((1 - point.x) * canvas.width, point.y * canvas.height, 4, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
            requestAnimationFrame(renderLoop);
        }

        startBtn.addEventListener("click", startApp);
    </script>
</body>
</html>
