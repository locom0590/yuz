<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fasiyal Paralizi - Takip</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100dvh; }
        .container { position: relative; width: 100vw; height: 100dvh; }
        /* Videoyu ve Canvas'ı aynı boyutta sabitle */
        #webcam, #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top: 0; left: 0; z-index: 1; }
        #output_canvas { z-index: 2; } /* Canvas üstte olsun */
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <button id="startBtn">Başla</button>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        let faceLandmarker;
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true }); // Optimizasyon
        const startBtn = document.getElementById("startBtn");

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
        }
        init();

        startBtn.addEventListener("click", async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.style.display = 'none';
            } catch (e) { alert("Kamera hatası!"); }
        });

        // Loop: Her frame'de canvas boyutunu kontrol et
        function renderLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Canvas'ı videonun gerçek boyutuna uydur
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                predict();
            }
            window.requestAnimationFrame(renderLoop);
        }
        
        async function predict() {
            if (!faceLandmarker) return;
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    const regions = {
                        "Gözler/Kaş": { indices: [33, 160, 158, 133, 153, 144, 263, 387, 385, 362, 380, 373, 70, 63, 105, 66, 107, 300, 293, 334, 296, 336], color: "#00FF00" },
                        "Dudaklar": { indices: [61, 291, 0, 17, 37, 267], color: "#FFFF00" },
                        "Nasolabial": { indices: [205, 425, 434, 435, 25, 204, 214, 215], color: "#FF00FF" },
                        "Alın": { indices: [109, 10, 338, 103, 107, 336, 105, 66, 296], color: "#00FFFF" },
                        "Elmacık": { indices: [117, 346], color: "#FFFFFF" }
                    };

                    for (const [name, data] of Object.entries(regions)) {
                        ctx.fillStyle = data.color;
                        for (const index of data.indices) {
                            const point = landmarks[index];
                            ctx.beginPath();
                            // Nokta boyutu 1, x0.25 oranında
                            ctx.arc(point.x * canvas.width, point.y * canvas.height, 1, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    }
                }
            }
        }
        
        video.addEventListener("loadedmetadata", () => {
            renderLoop();
        });
    </script>
</body>
</html>
