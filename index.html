<!DOCTYPE html>
<html lang="tr">
<head>
   <script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    let faceLandmarker;
    const video = document.getElementById("webcam");
    const startBtn = document.getElementById("startBtn");

    async function init() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", 
                delegate: "GPU" 
            },
            runningMode: "VIDEO"
        });
        console.log("MediaPipe hazır!");
    }

    init();
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

    startBtn.addEventListener("click", async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            startBtn.style.display = 'none';
            video.addEventListener("loadeddata", predict);
        } catch (e) {
            console.error("Kamera hatası:", e);
        }
    });

   async function predict() {
        if (!faceLandmarker) return;

        // Görüntüyü işle
        const results = faceLandmarker.detectForVideo(video, performance.now());

        // Canvas'ı temizle
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.faceLandmarks) {
            for (const landmarks of results.faceLandmarks) {
                // Her nokta için canvas'a çizim yap
                ctx.fillStyle = "#00FF00"; // Yeşil noktalar
                for (const point of landmarks) {
                    // Kamera ayna modunda olduğu için x koordinatını ters çeviriyoruz
                    const x = (1 - point.x) * canvas.width;
                    const y = point.y * canvas.height;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }
        window.requestAnimationFrame(predict);
    }
    </style>
</head>
<body>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <button id="startBtn">Başla</button>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; 
            } catch (err) {
                console.error("Kamera hatası: ", err);
                alert("Kameraya erişilemedi. Lütfen izin verin.");
            }
        });
    </script>
</body>
</html>
